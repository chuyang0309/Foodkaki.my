<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOODKAKI.my - Food Memories</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Shared Components CSS -->
    <link rel="stylesheet" href="shared-components.css">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="photo.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
   
       
</head>
<body>
    <!-- Header will be populated by shared-components.js -->
    <header></header>
    
    <!-- Hero Section with Beautiful Food Image -->
    <section class="hero-section" style="background: linear-gradient(rgba(93, 64, 55, 0.7), rgba(93, 64, 55, 0.7)), url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80') no-repeat center center/cover, #5d4037;">
        <div class="container hero-content">
            <h1 class="hero-title">Share Your Food Memories</h1>
            <p class="hero-subtitle">Upload and share your delicious Malaysian food experiences</p>
        </div>
    </section>
    
    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <h2 class="section-title">Food Memories Gallery</h2>
            
            <div class="upload-card">
                <form id="uploadForm" class="upload-form">
                    <label for="photoUpload">Choose food photos:</label>
                    <input type="file" id="photoUpload" name="photos" multiple accept="image/*">
                    <button type="submit">Upload Photos</button>
                </form>
            </div>
            
            <div class="counters text-center">
                <div class="counter photos">
                    <span class="label">Food Photos:</span>
                    <span class="count">0</span>
                </div>
                <div class="loading" id="loading">Loading...</div>
            </div>
            
            <div class="filter-buttons">
                <button class="all-btn active">All Photos</button>
            </div>
            
            <div class="gallery">
                <!-- Static content for demo; these will be dynamically updated -->
                <img src="imagephoto/image1.jpg" alt="Malaysian Food 1" class="photo">
                <img src="imagephoto/image2.jpg" alt="Malaysian Food 2" class="photo">
                <img src="imagephoto/image3.jpg" alt="Malaysian Food 3" class="photo">
            </div>
            
            <button id="fetchImages" class="fetch-button">Discover More Food Images</button>
        </div>
    </section>

    <!-- Footer will be populated by shared-components.js -->
    <footer></footer>

    <!-- JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Shared Components JavaScript -->
    <script src="shared-components.js"></script>
    
   <script src="photo.js"></script>
    
</body>
</html>
